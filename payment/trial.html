<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Request Trial — Auto-AI-Cluster Enterprise</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0d1117;color:#c9d1d9;line-height:1.6}
.container{max-width:600px;margin:0 auto;padding:60px 20px}
h1{color:#58a6ff;margin-bottom:8px}
p{color:#8b949e;margin-bottom:32px}
.form-group{margin-bottom:20px}
label{display:block;margin-bottom:6px;font-weight:500;color:#f0f6fc}
input,select{width:100%;padding:12px 16px;background:#1c2128;border:1px solid #30363d;border-radius:8px;color:#fff;font-size:15px}
input:focus,select:focus{outline:none;border-color:#58a6ff}
.btn{width:100%;padding:14px;background:#1f6feb;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer}
.btn:hover{background:#388bfd}
.note{font-size:13px;color:#8b949e;margin-top:16px;text-align:center}
</style>
</head>
<body>
<div class="container">
<h1>Request 14-Day Free Trial</h1>
<p>Enterprise K8s Edition — full features, no credit card required.</p>
<form action="mailto:zslgh162122@126.com" method="GET" enctype="text/plain">
<div class="form-group">
<label>Company / Team Name</label>
<input type="text" name="company" placeholder="e.g. Acme Corp" required>
</div>
<div class="form-group">
<label>Email Address</label>
<input type="email" name="email" placeholder="you@company.com" required>
</div>
<div class="form-group">
<label>Deployment Scale</label>
<select name="scale">
<option>1-3 servers (testing)</option>
<option selected>3-10 servers (production)</option>
<option>10+ servers (multi-region)</option>
</select>
</div>
<div class="form-group">
<label>Notes (optional)</label>
<input type="text" name="notes" placeholder="What is your use case?">
</div>
<input type="hidden" name="subject" value="Enterprise Trial Request - Auto-AI-Cluster">
<button type="submit" class="btn">Send Trial Request</button>
</form>
<p class="note">We will respond within 24 hours with your license key.</p>
</div>
